<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Indian Hair Economy Summit | Sep 2026</title>
    <meta name="description" content="India's premier hair industry summit — workshops, certifications & networking for salon owners, stylists, educators and brands. Bangalore, Delhi, Mumbai." />
    <meta name="author" content="Emilio Beaufort" />
    <meta property="og:title" content="The Indian Hair Economy Summit" />
    <meta property="og:description" content="India's premier hair industry summit — workshops, certifications & networking. September 2026." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- Custom cursor elements -->
    <div id="custom-cursor"></div>
    <div id="custom-cursor-ring"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      /* ── Custom cursor ── */
      const dot  = document.getElementById('custom-cursor');
      const ring = document.getElementById('custom-cursor-ring');
      let mx = 0, my = 0, rx = 0, ry = 0;

      document.addEventListener('mousemove', (e) => {
        mx = e.clientX; my = e.clientY;
        dot.style.transform  = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
      });

      // Ring follows with slight lag
      (function animateRing() {
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
        requestAnimationFrame(animateRing);
      })();

      // Expand on interactive elements
      document.addEventListener('mouseover', (e) => {
        if (e.target.closest('a, button, [role="button"]')) {
          dot.style.width  = '18px';
          dot.style.height = '18px';
          dot.style.background = 'rgba(196,169,125,0.9)';
          ring.style.width  = '52px';
          ring.style.height = '52px';
          ring.style.borderColor = 'rgba(196,169,125,0.5)';
        }
      });
      document.addEventListener('mouseout', (e) => {
        if (e.target.closest('a, button, [role="button"]')) {
          dot.style.width  = '10px';
          dot.style.height = '10px';
          dot.style.background = '#212842';
          ring.style.width  = '36px';
          ring.style.height = '36px';
          ring.style.borderColor = 'rgba(33,40,66,0.4)';
        }
      });

      /* ── Scroll-reveal ── */
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.12 });

      // Observe all reveal elements once DOM is ready
      const attachReveals = () => {
        document.querySelectorAll('.reveal, .reveal-left, .reveal-right').forEach((el) => {
          revealObserver.observe(el);
        });
      };
      // Run after React mounts (small delay)
      setTimeout(attachReveals, 600);

      // Re-attach on any DOM mutation (React re-renders)
      new MutationObserver(attachReveals).observe(
        document.getElementById('root'),
        { childList: true, subtree: true }
      );
    </script>
  </body>
</html>
